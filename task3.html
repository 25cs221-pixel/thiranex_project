<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced To-Do List App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
}

button{
    padding:12px 18px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.add-btn{
    background:#2563eb;
    color:white;
}

.filters{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}

.filter-btn{
    background:#ddd;
}

.filter-btn.active{
    background:#2563eb;
    color:white;
}

ul{
    list-style:none;
}

.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f8f8f8;
    margin-bottom:10px;
    padding:12px;
    border-radius:8px;
}

.task.completed span{
    text-decoration:line-through;
    color:gray;
}

.task-actions{
    display:flex;
    gap:8px;
}

.complete-btn{
    background:green;
    color:white;
}

.edit-btn{
    background:orange;
    color:white;
}

.delete-btn{
    background:red;
    color:white;
}

@media(max-width:600px){

    .task{
        flex-direction:column;
        gap:10px;
        align-items:flex-start;
    }

    .task-actions{
        width:100%;
        justify-content:flex-end;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>To-Do List</h1>

    <div class="input-group">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter task..."
        >
        <button class="add-btn" id="addTaskBtn">
            Add
        </button>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">
            All
        </button>

        <button class="filter-btn" data-filter="active">
            Active
        </button>

        <button class="filter-btn" data-filter="completed">
            Completed
        </button>
    </div>

    <ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

const taskInput = document.getElementById("taskInput");
const addTaskBtn = document.getElementById("addTaskBtn");
const taskList = document.getElementById("taskList");

function saveTasks(){
    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

function renderTasks(){

    taskList.innerHTML = "";

    let filteredTasks = tasks.filter(task => {

        if(currentFilter === "active"){
            return !task.completed;
        }

        if(currentFilter === "completed"){
            return task.completed;
        }

        return true;
    });

    filteredTasks.forEach(task => {

        const li = document.createElement("li");

        li.className =
            task.completed
            ? "task completed"
            : "task";

        li.dataset.id = task.id;

        li.innerHTML = `
            <span>${task.text}</span>

            <div class="task-actions">

                <button class="complete-btn">
                    ✓
                </button>

                <button class="edit-btn">
                    Edit
                </button>

                <button class="delete-btn">
                    Delete
                </button>

            </div>
        `;

        taskList.appendChild(li);
    });
}

function addTask(){

    const text = taskInput.value.trim();

    if(text === "") return;

    tasks.push({
        id: Date.now(),
        text,
        completed:false
    });

    saveTasks();
    renderTasks();

    taskInput.value = "";
}

addTaskBtn.addEventListener("click", addTask);

taskInput.addEventListener("keypress", e => {

    if(e.key === "Enter"){
        addTask();
    }

});

taskList.addEventListener("click", e => {

    const taskElement =
        e.target.closest(".task");

    if(!taskElement) return;

    const id =
        Number(taskElement.dataset.id);

    const task =
        tasks.find(t => t.id === id);

    if(e.target.classList.contains("delete-btn")){

        tasks =
        tasks.filter(t => t.id !== id);

    }

    if(e.target.classList.contains("complete-btn")){

        task.completed =
        !task.completed;

    }

    if(e.target.classList.contains("edit-btn")){

        const updatedText =
        prompt(
            "Edit task:",
            task.text
        );

        if(
            updatedText &&
            updatedText.trim()
        ){
            task.text =
            updatedText.trim();
        }
    }

    saveTasks();
    renderTasks();

});

document
.querySelectorAll(".filter-btn")
.forEach(button => {

    button.addEventListener("click", () => {

        document
        .querySelectorAll(".filter-btn")
        .forEach(btn =>
            btn.classList.remove("active")
        );

        button.classList.add("active");

        currentFilter =
        button.dataset.filter;

        renderTasks();

    });

});

renderTasks();

</script>

</body>
</html>
