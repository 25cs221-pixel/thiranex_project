<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

.container{
    width:90%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
}

button{
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.weather-card{
    margin-top:25px;
    display:none;
}

.weather-card h2{
    margin-bottom:15px;
}

.metric{
    margin:10px 0;
    font-size:18px;
}

.error{
    color:red;
    margin-top:15px;
    text-align:center;
}

</style>
</head>
<body>

<div class="container">

    <h1>Weather Dashboard</h1>

    <div class="search-box">
        <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
        >

        <button id="searchBtn">
            Search
        </button>
    </div>

    <p id="errorMessage" class="error"></p>

    <div id="weatherCard" class="weather-card">

        <h2 id="cityName"></h2>

        <p class="metric">
            🌡 Temperature:
            <span id="temperature"></span>
        </p>

        <p class="metric">
            💧 Humidity:
            <span id="humidity"></span>
        </p>

        <p class="metric">
            💨 Wind Speed:
            <span id="windSpeed"></span>
        </p>

        <p class="metric">
            ☁ Condition:
            <span id="condition"></span>
        </p>

    </div>

</div>

<script>

// ===============================
// OpenWeatherMap API Key
// Replace with your API key
// ===============================

const API_KEY = "YOUR_API_KEY";

// DOM Elements

const cityInput =
document.getElementById("cityInput");

const searchBtn =
document.getElementById("searchBtn");

const weatherCard =
document.getElementById("weatherCard");

const errorMessage =
document.getElementById("errorMessage");

// ===============================
// Fetch Weather
// ===============================

async function getWeather(city){

    try{

        errorMessage.textContent = "";
        weatherCard.style.display = "none";

        const response =
        await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
        );

        if(!response.ok){

            throw new Error(
                "City not found"
            );
        }

        const data =
        await response.json();

        displayWeather(data);

    }
    catch(error){

        errorMessage.textContent =
        error.message;

    }

}

// ===============================
// Render JSON Data
// ===============================

function displayWeather(data){

    document.getElementById(
        "cityName"
    ).textContent =
    `${data.name}, ${data.sys.country}`;

    document.getElementById(
        "temperature"
    ).textContent =
    `${data.main.temp} °C`;

    document.getElementById(
        "humidity"
    ).textContent =
    `${data.main.humidity}%`;

    document.getElementById(
        "windSpeed"
    ).textContent =
    `${data.wind.speed} m/s`;

    document.getElementById(
        "condition"
    ).textContent =
    data.weather[0].description;

    weatherCard.style.display =
    "block";

}

// ===============================
// Event Listeners
// ===============================

searchBtn.addEventListener(
    "click",
    () => {

        const city =
        cityInput.value.trim();

        if(city){
            getWeather(city);
        }

    }
);

cityInput.addEventListener(
    "keypress",
    e => {

        if(e.key === "Enter"){

            const city =
            cityInput.value.trim();

            if(city){
                getWeather(city);
            }

        }

    }
);

</script>

</body>
</html>
